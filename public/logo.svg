<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" role="img" aria-label="Löwengold Calw – Gold & Silberankauf">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c29a58"/>
      <stop offset="50%" stop-color="#a67c2e"/>
      <stop offset="100%" stop-color="#7e5920"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="50%" stop-color="#c7c7c7"/>
      <stop offset="100%" stop-color="#b4b4b4"/>
    </linearGradient>
  </defs>

  <!-- Transparent background; the container paints cream -->
  <g fill="none" stroke="url(#silverGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top crest crown -->
    <path d="M450 35 L435 62 L452 60 L450 95 L440 88 L445 110 L455 110 L460 88 L450 95 L448 60 L465 62 Z" fill="url(#silverGrad)" stroke="none"/>
    <!-- Ornate frame - top scrolls around the lion -->
    <path d="M260 130 C 220 140 190 180 205 230 C 215 210 240 200 260 210"/>
    <path d="M640 130 C 680 140 710 180 695 230 C 685 210 660 200 640 210"/>
    <path d="M300 120 C 330 110 360 110 380 130"/>
    <path d="M600 120 C 570 110 540 110 520 130"/>
    <!-- Inner ornamental curves forming an arch -->
    <path d="M300 260 C 320 220 360 200 400 200"/>
    <path d="M600 260 C 580 220 540 200 500 200"/>
    <!-- Leaf flourishes on the sides -->
    <path d="M200 260 C 160 260 140 290 150 330 C 170 310 195 305 210 315"/>
    <path d="M700 260 C 740 260 760 290 750 330 C 730 310 705 305 690 315"/>
    <path d="M180 290 C 200 320 230 330 260 320"/>
    <path d="M720 290 C 700 320 670 330 640 320"/>
    <!-- Lower sweeping wings / banner under the lion -->
    <path d="M230 360 C 260 370 300 380 340 380 L 340 400 C 300 400 260 395 230 380 Z" fill="url(#silverGrad)" stroke="none" opacity="0.85"/>
    <path d="M670 360 C 640 370 600 380 560 380 L 560 400 C 600 400 640 395 670 380 Z" fill="url(#silverGrad)" stroke="none" opacity="0.85"/>
    <path d="M190 380 C 230 415 300 430 360 420"/>
    <path d="M710 380 C 670 415 600 430 540 420"/>
    <path d="M220 395 C 260 425 320 440 380 435"/>
    <path d="M680 395 C 640 425 580 440 520 435"/>
  </g>

  <!-- Central shield - subtle -->
  <g fill="url(#silverGrad)" opacity="0.35">
    <path d="M360 160 Q 450 140 540 160 L 530 340 Q 450 370 370 340 Z"/>
  </g>

  <!-- LION HEAD - stylized heraldic, gold -->
  <g transform="translate(450 260)" fill="url(#goldGrad)">
    <!-- Mane outer silhouette -->
    <path d="M 0 -110
             C -30 -110 -55 -95 -75 -75
             C -95 -55 -110 -28 -112 -5
             C -115 20 -108 40 -98 55
             C -108 65 -110 80 -100 95
             C -92 108 -78 110 -68 102
             C -72 95 -70 85 -62 80
             C -60 92 -52 100 -42 96
             C -42 106 -38 116 -28 118
             C -22 114 -20 108 -22 100
             C -12 108 -2 108 0 102
             C 2 108 12 108 22 100
             C 20 108 22 114 28 118
             C 38 116 42 106 42 96
             C 52 100 60 92 62 80
             C 70 85 72 95 68 102
             C 78 110 92 108 100 95
             C 110 80 108 65 98 55
             C 108 40 115 20 112 -5
             C 110 -28 95 -55 75 -75
             C 55 -95 30 -110 0 -110 Z"/>
  </g>

  <!-- Lion face details (dark on gold) -->
  <g transform="translate(450 260)" fill="none" stroke="#2b1c0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Inner face shape -->
    <path d="M -45 -20 C -45 20 -25 55 0 60 C 25 55 45 20 45 -20 C 45 -50 25 -65 0 -65 C -25 -65 -45 -50 -45 -20 Z" fill="#ba8a3a"/>
    <!-- Eyes (almond shaped, narrowed) -->
    <path d="M -25 -20 C -20 -24 -8 -24 -3 -20 C -8 -15 -20 -15 -25 -20 Z" fill="#2b1c0f" stroke="none"/>
    <path d="M  25 -20 C  20 -24  8 -24  3 -20 C  8 -15 20 -15 25 -20 Z" fill="#2b1c0f" stroke="none"/>
    <!-- Brow lines -->
    <path d="M -30 -30 L -6 -28"/>
    <path d="M  30 -30 L  6 -28"/>
    <!-- Nose -->
    <path d="M -8 0 L 8 0 L 0 14 Z" fill="#2b1c0f" stroke="none"/>
    <!-- Mouth / muzzle -->
    <path d="M -16 22 Q 0 32 16 22"/>
    <path d="M 0 14 L 0 26"/>
    <!-- Chin beard tuft -->
    <path d="M -10 40 L -8 55 L 0 48 L 8 55 L 10 40" fill="#7e5920" stroke="none"/>
    <!-- Mane interior strands -->
    <path d="M -70 -40 C -60 -20 -55 0 -55 20"/>
    <path d="M  70 -40 C  60 -20  55 0  55 20"/>
    <path d="M -62 -78 C -50 -60 -46 -50 -46 -40"/>
    <path d="M  62 -78 C  50 -60  46 -50  46 -40"/>
    <path d="M -28 -92 C -22 -75 -22 -68 -22 -62"/>
    <path d="M  28 -92 C  22 -75  22 -68  22 -62"/>
    <path d="M 0 -95 L 0 -68" />
  </g>

  <!-- CALW small label under lion -->
  <text x="450" y="395" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="6" fill="#2b1c0f" font-weight="400">CALW</text>

  <!-- Decorative ornamental dots -->
  <g fill="#b4b4b4">
    <circle cx="320" cy="345" r="2.5"/>
    <circle cx="330" cy="352" r="1.5"/>
    <circle cx="336" cy="344" r="1.5"/>
    <circle cx="580" cy="345" r="2.5"/>
    <circle cx="570" cy="352" r="1.5"/>
    <circle cx="564" cy="344" r="1.5"/>
  </g>

  <!-- Horizontal rule above LÖWENGOLD -->
  <g stroke="url(#silverGrad)" stroke-width="2">
    <line x1="160" y1="440" x2="740" y2="440"/>
    <line x1="160" y1="446" x2="740" y2="446" opacity="0.55"/>
    <circle cx="140" cy="443" r="5" fill="url(#silverGrad)" stroke="none"/>
    <circle cx="760" cy="443" r="5" fill="url(#silverGrad)" stroke="none"/>
  </g>

  <!-- Main LÖWENGOLD word -->
  <text x="450" y="555" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="108" letter-spacing="6" fill="url(#goldGrad)" font-weight="600">LÖWENGOLD</text>

  <!-- Bottom ornamental rule -->
  <g stroke="url(#silverGrad)" stroke-width="2">
    <line x1="160" y1="595" x2="740" y2="595"/>
    <line x1="160" y1="601" x2="740" y2="601" opacity="0.55"/>
    <circle cx="140" cy="598" r="5" fill="url(#silverGrad)" stroke="none"/>
    <circle cx="760" cy="598" r="5" fill="url(#silverGrad)" stroke="none"/>
  </g>

  <!-- Tagline -->
  <text x="450" y="645" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" letter-spacing="7" fill="#3b2a19" font-weight="500">GOLD &amp; SILBERANKAUF</text>

  <!-- Bottom scrollwork / swash -->
  <g fill="none" stroke="url(#silverGrad)" stroke-width="2" stroke-linecap="round">
    <path d="M 220 680 C 280 710 370 712 440 692"/>
    <path d="M 680 680 C 620 710 530 712 460 692"/>
    <path d="M 250 690 C 320 700 380 700 420 690"/>
    <path d="M 650 690 C 580 700 520 700 480 690"/>
  </g>
</svg>
